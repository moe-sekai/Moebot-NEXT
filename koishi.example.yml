# ============================================================
# Moebot NEXT — Koishi 配置文件
# ============================================================
# 复制此文件为 koishi.yml 后编辑
# cp koishi.example.yml koishi.yml
# ============================================================

plugins:
  # ---- Web 服务 ----
  server:
    port: 5140
    host: 0.0.0.0

  # ---- Koishi Console WebUI ----
  console:
    open: false
    # Moebot 管理页目前以 Console 扩展源码方式注入，需要 devMode 开启 Vite 编译。
    devMode: true
    dev:
      fs:
        strict: true
        allow:
          - .

  # ---- 数据库 (SQLite / libSQL 本地文件) ----
  database-sqlite:
    path: ./data/moebot.db

  # ---- OneBot 协议适配器 ----
  # 使用反向 WebSocket 连接 NapCat / Lagrange / LLOneBot
  adapter-onebot:
    # 你的 QQ 机器人账号
    selfId: "123456789"
    # 反向 WebSocket 模式
    protocol: ws-reverse
    # 监听端口 (需要与 QQ 框架配置一致)
    endpoint: ws://0.0.0.0:6700

  # ---- Moebot 核心插件 ----
  # 对应 workspace 包: koishi-plugin-moebot-core
  moebot-core:
    masterDataUrl: https://sk.exmeaning.com/master
    masterDataRefreshInterval: 3600000
    imageCache:
      enabled: true
      maxSizeBytes: 1073741824
      ttlMs: 86400000
    commandPrefix: "/"
    # SEKAI API 配置 (可选 — 不配置不影响基本功能)
    # 也可以在管理面板 WebUI 中配置
    sekaiApi:
      enabled: false
      baseUrl: ""
      region: jp
      headers: {}
      timeout: 10000
      rateLimit: 30
      # proxy: "http://127.0.0.1:7890"

  # ---- Moebot 管理面板扩展 ----
  # 对应 workspace 包: koishi-plugin-moebot-console
  moebot-console:
    auth:
      username: admin
      password: ""
