# Moebot NEXT 核心配置（破坏性精简版）
#
# 仅保留与"裸项目核心"相关的字段：bot driver / web 控制台 / 数据库 /
# renderer / 日志 / 插件子系统。任何 PJSK / Project Sekai 相关配置都
# 移到了 data/plugins/moesekai.yml；启用 moesekai 插件后才会被加载。
#
# 老版 config.yml（包含 masterdata / sekai_api / suite_api / ranking_api /
# b30 / assets / game_servers 段）已不再被解析为业务配置。请把这些段落
# 整体迁移到 data/plugins/moesekai.yml（结构完全一致）。

bot:
  nickname: ["moebot", "萌萌"]
  command_prefix: "/"
  super_users: []
  driver:
    type: "ws-reverse"        # ws-reverse or ws
    listen: "0.0.0.0:6700"    # reverse websocket listen address
    url: "ws://127.0.0.1:6700" # forward websocket target
    token: ""

web:
  host: "0.0.0.0"
  port: 8080
  auth:
    username: "admin"
    password: ""
    jwt_secret: ""

database:
  path: "./data/moebot.db"

backup:
  # Docker 内等价于 /app/data；本地运行默认 ./data
  data_dir: "./data"
  temp_dir: "./data/backups/tmp"
  # 默认只备份关键数据：配置、数据库、插件数据、master 等；不上传缓存/临时文件。
  exclude_patterns:
    - "cache/**"
    - "backups/tmp/**"
    - "*.tmp"
    - "*.restore-backup-*"
  schedule:
    # 开启后由主进程按固定间隔自动创建 S3 备份；24 表示每天一次。
    enabled: false
    interval_hours: 24
  s3:
    # S3 兼容存储 endpoint，例如：s3.amazonaws.com / minio.example.com:9000
    endpoint: ""
    # MinIO 可留空；AWS/R2/其他云厂商按服务要求填写
    region: ""
    bucket: ""
    prefix: "moebot-next/backups"
    access_key: ""
    secret_key: ""
    session_token: ""
    use_ssl: true
    # MinIO / 多数 S3 兼容服务建议开启 path-style
    force_path_style: true

renderer:
  host: "127.0.0.1"
  port: 13001
  precision: 1.5
  chart_precision: 4
  cache:
    enabled: true
    path: "./data/cache"
    max_size_mb: 0
    ttl_hours: 0

log:
  level: "info"
  format: "console"

# 插件子系统
#
#   data_dir：插件子配置文件目录（每个插件读 <data_dir>/<name>.yml）
#   enabled：首次启动时默认启用的插件名列表（仅在数据库中尚无该插件
#           记录时生效；之后控制台的开关状态成为唯一真值）
plugins:
  data_dir: ./data/plugins
  enabled:
    - moesekai
    # autochat 默认不启用：需先在控制台「插件 → autochat」配置好
    # OpenAI 兼容 / Anthropic 的 API Key 后再启用，避免空 key 触发请求失败。
    # 配置文件：data/plugins/autochat.yml
