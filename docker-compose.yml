services:
  moebot:
    build:
      context: .
      dockerfile: Dockerfile
    image: moebot-next-go:latest
    container_name: moebot-next-go
    restart: unless-stopped
    ports:
      - "8080:8080"   # Web 控制台
      - "6700:6700"   # OneBot 反向 WebSocket
    environment:
      TZ: Asia/Shanghai
    volumes:
      # 持久化数据库 / 缓存 / 下载的 master 数据 / 配置文件
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
